<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driving Diagram 0</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #2a2a2a;
    }
  </style>
</head>
<body>

<div id="diagram"></div>

<script src="js/core.js"></script>
<script src="js/roads.js"></script>
<script src="js/intersections.js"></script>
<script src="js/vehicles.js"></script>
<script src="js/signals.js"></script>
<script src="js/terrain.js"></script>
<script src="js/renderer.js"></script>
<script>

// ==========================================
// LAYOUT CONFIG
// ==========================================
const CONFIG = {
  canvasWidth: 816,
  canvasHeight: 1056,
  laneWidth: 50,
  verticalLaneWidth: 75,
  verticalLanesPerDirection: 1,
  horizontalLanesPerDirection: 2,
  intersectionType: 'fourWay',
  centerX: 0,
  centerY: 0,
};

// ==========================================
// NO CARS
// ==========================================
const CARS = [];

// ==========================================
// RENDER
// ==========================================
const container = document.getElementById('diagram');
Renderer.render(container, CONFIG, CARS);
Renderer.addExportButton(container, 'diagram_0.png');

</script>
</body>
</html>
